# Plano de build explicito para o Nixpacks (Railway).
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --prefer-offline"]
cacheDirectories = ["node_modules", ".npm"]

[phases.build]
cmds = ["npm run build"]
cacheDirectories = ["node_modules/.vite", "dist"]

[start]
cmd = "node server/index.mjs"
